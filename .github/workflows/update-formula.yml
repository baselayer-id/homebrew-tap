name: Update Formula

on:
  repository_dispatch:
    types: [update-formula]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to update to (e.g., 0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.event.client_payload.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Download release artifacts & compute SHAs
        id: shas
        run: |
          V="${{ steps.version.outputs.version }}"
          BASE="https://github.com/baselayer-id/bl/releases/download/v${V}"

          # Retry with backoff — GitHub needs a moment to make release assets
          # downloadable after the release is published.
          download_with_retry() {
            local url="$1"
            local out="$2"
            for attempt in 1 2 3 4 5 6; do
              if curl -fsSL -o "$out" "$url"; then
                return 0
              fi
              echo "Attempt ${attempt} failed, waiting $((attempt * 10))s..."
              sleep $((attempt * 10))
            done
            echo "Failed to download after 6 attempts: $url"
            return 1
          }

          for arch in aarch64-apple-darwin x86_64-apple-darwin; do
            download_with_retry "${BASE}/bl-${arch}.tar.gz" "bl-${arch}.tar.gz"
          done

          SHA_ARM=$(sha256sum bl-aarch64-apple-darwin.tar.gz | awk '{print $1}')
          SHA_X86=$(sha256sum bl-x86_64-apple-darwin.tar.gz | awk '{print $1}')

          echo "sha_arm=${SHA_ARM}" >> $GITHUB_OUTPUT
          echo "sha_x86=${SHA_X86}" >> $GITHUB_OUTPUT

      - name: Update formula
        run: |
          V="${{ steps.version.outputs.version }}"
          python3 <<EOF
          import re

          with open('Formula/bl.rb') as f:
              content = f.read()

          content = re.sub(r'version "[^"]+"', 'version "${V}"', content)

          lines = content.split('\n')
          in_arm = in_intel = False
          for i, line in enumerate(lines):
              if 'on_arm' in line:
                  in_arm, in_intel = True, False
              elif 'on_intel' in line:
                  in_arm, in_intel = False, True
              elif in_arm and 'sha256' in line:
                  lines[i] = re.sub(r'sha256 "[^"]+"', 'sha256 "${{ steps.shas.outputs.sha_arm }}"', line)
                  in_arm = False
              elif in_intel and 'sha256' in line:
                  lines[i] = re.sub(r'sha256 "[^"]+"', 'sha256 "${{ steps.shas.outputs.sha_x86 }}"', line)
                  in_intel = False

          with open('Formula/bl.rb', 'w') as f:
              f.write('\n'.join(lines))
          EOF

      - name: Commit & push
        run: |
          V="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/bl.rb
          git diff --quiet --cached || {
            git commit -m "bl ${V}"
            git push
          }
